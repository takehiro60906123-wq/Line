<style>
    /* グローバルヘッダー (ステータス表示用) */
    .global-header {
    position: fixed;
    top: 0; left: 0; width: 100%;
    
    /* ★修正: safe-area-inset-topでノッチ対応 */
    height: calc(var(--header-h, 50px) + env(safe-area-inset-top, 0px));
    
    background: linear-gradient(to bottom, #000 0%, rgba(0,0,0,0.9) 80%, rgba(0,0,0,0.7) 100%);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: flex-end; 
    padding: 0 10px;
    
    /* ★修正: 上部にセーフエリア分の余白 */
    padding-top: env(safe-area-inset-top, 0px);
    
    box-sizing: border-box;
    border-bottom: 2px solid rgba(255,255,255,0.1);
    pointer-events: none; 
}

/* ★追加: PWAスタンドアロンモード時のヘッダー微調整 */
.pwa-standalone .global-header {
    /* スタンドアロンモードではノッチのみ考慮 */
}

/* ★追加: ブラウザモード時（URLバーがある場合）*/
.pwa-browser .global-header {
    /* ブラウザモードでは追加調整不要（URLバーの下にヘッダーが来る） */
}
    .gh-right { display: flex; align-items: center; gap: 10px; pointer-events: auto; }
    
    .gh-resource {
        display: flex; align-items: center;
        background: rgba(0,0,0,0.6); border: 1px solid #666;
        border-radius: 20px; padding: 3px 10px 3px 3px;
        height: 32px; min-width: 100px;
    }
    .gh-icon {
        width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
        font-size: 17px; background: #333; border-radius: 50%; margin-right: 6px; border: 1px solid #888;
    }
    .gh-val { color: #fff; font-weight: bold; font-family: monospace; font-size: 13px; flex: 1; text-align: right; }
    .gh-plus {
        width: 22px; height: 22px; background: #00ced1; color: #000;
        border-radius: 4px; display: flex; align-items: center; justify-content: center;
        font-weight: bold; font-size: 16px; margin-left: 6px; cursor: pointer;
    }

 /* ★修正: 画面コンテンツ位置調整 (ヘッダー + セーフエリア) */
.screen {
    padding-top: calc(var(--header-h, 50px) + env(safe-area-inset-top, 0px)) !important;
}

/* ★追加: バトル画面はフルスクリーン（ヘッダーなし）*/
#screen-battle {
    padding-top: env(safe-area-inset-top, 0px) !important;
}
    
  /* ★修正: ホームロゴ位置 */
.home-logo-area {
    margin-top: calc(20px + env(safe-area-inset-top, 0px));
}

/* ホーム画面キャラクター配置 */
.home-char-anim {
    position: absolute;
    
    /* ★修正1: 位置を少し下げる（床に足を着けるため） */
    bottom: 200px; 
    
    /* ★修正2: 左端からの距離（少し左に寄せる） */
    left: 10px;
    
    /* ★修正3: サイズを小さくする（160px → 90px くらいに） */
    width: 140px; 
    height: auto;
    
    /* 重なり順などの設定はそのまま */
    z-index: 20;
    pointer-events: none;
    /* 影をつけて馴染ませる（お好みで） */
    filter: drop-shadow(4px 7px 5px rgba(0,0,0,0.8));
}

/* 画面サイズに応じた微調整（必要な場合） */
@media (max-width: 380px) {
    .home-char-anim {
        width: 140px;
        bottom: 120px;
        left: 0;
    }

}
</style>

<style>
/* --- 塔画面のスタイル修正 --- */

/* 1. 背景画像をセットし、雰囲気を暗くする */
#screen-tower {
    /* お好みの塔の画像を images フォルダに入れてファイル名を指定してください */
    /* もし画像がない場合は、仮で暗いグラデーションにします */
    background: linear-gradient(to bottom, #050510, #1a0b2e); 
    /* 画像がある場合は以下を有効にしてください */
    background-image: url('images/bg_tower_top.webp'); 
    background-size: cover;
    background-position: center bottom;
    color: #fff;
}

/* 2. 不要な「東京タワーアイコン」を消す */
.tower-icon-large {
    display: none !important;
}

/* 3. かっこいい「挑戦ボタン」のデザイン定義 */
.btn-tower-challenge {
    position: relative;
    width: 260px;
    padding: 15px 0;
    margin: 20px auto;
    
    /* 紫～ピンクの怪しいグラデーション */
    background: linear-gradient(135deg, #b000e0 0%, #6a00ff 100%);
    border: 2px solid #deaaff;
    border-radius: 50px;
    
    /* 文字スタイル */
    color: #fff;
    font-size: 24px;
    font-weight: 900;
    font-family: sans-serif;
    letter-spacing: 2px;
    text-shadow: 0 0 10px #e0f, 0 2px 0 #000;
    
    /* 発光エフェクト */
    box-shadow: 
        0 0 20px rgba(160, 0, 255, 0.6), 
        inset 0 2px 10px rgba(255, 255, 255, 0.4);
    
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.1s;
}

/* ボタンのキラッと光るアニメーション */
.btn-tower-challenge::after {
    content: '';
    position: absolute;
    top: -50%; left: -100%;
    width: 50%; height: 200%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
    transform: rotate(25deg);
    animation: shineFlow 3s infinite ease-in-out;
}

@keyframes shineFlow {
    0% { left: -100%; }
    20% { left: 200%; }
    100% { left: 200%; }
}

.btn-tower-challenge:active {
    transform: scale(0.95);
    filter: brightness(0.8);
}

.btn-sub-text {
    display: block;
    font-size: 11px;
    font-weight: normal;
    color: #e0ccff;
    margin-top: 2px;
    letter-spacing: 0;
    text-shadow: none;
    opacity: 0.9;
}

/* =============================================
   ★塔 敵プレビュー (カードグリッド)
   ============================================= */
.tower-section-label {
    font-size: 12px;
    font-weight: bold;
    color: #ff6666;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 0 0 8px rgba(255,0,0,0.3);
}

/* カードグリッド (4列) */
.tower-card-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    width: 100%;
    padding: 0;
}

/* 個別カード */
.tower-enemy-card {
    position: relative;
    aspect-ratio: 3 / 4;
    background: #222;
    border: 2px solid #555;
    border-radius: 6px;
    background-size: cover, cover;
    background-position: center, center;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

/* UR光沢エフェクト */
.tower-enemy-card.rarity-ur {
    border-color: #e100ff;
    box-shadow: 0 0 8px rgba(225,0,255,0.4), 0 2px 6px rgba(0,0,0,0.5);
}
.tower-enemy-card.rarity-ur::after {
    content: '';
    position: absolute;
    top: 0; left: -150%;
    width: 100%; height: 100%;
    background: linear-gradient(105deg,
        rgba(255,255,255,0) 10%,
        rgba(255,230,150,0.4) 30%,
        rgba(255,255,255,1.0) 50%,
        rgba(255,230,150,0.4) 70%,
        rgba(255,255,255,0) 90%);
    transform: skewX(-20deg);
    pointer-events: none;
    animation: towerKiraShine 3.5s infinite ease-in-out;
    z-index: 10;
    filter: drop-shadow(0 0 5px rgba(255,215,0,0.8));
}
@keyframes towerKiraShine {
    0% { left: -150%; opacity: 0; }
    15% { opacity: 1; }
    35% { left: 150%; opacity: 1; }
    100% { left: 150%; opacity: 0; }
}

/* Lvバッジ (左上) */
.tec-lv-badge {
    position: absolute;
    top: 2px; left: 2px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 9px;
    font-weight: bold;
    padding: 1px 4px;
    border-radius: 3px;
    z-index: 20;
}

/* タイプアイコン (右上) */
.tec-type-badge {
    position: absolute;
    top: 1px; right: 2px;
    font-size: 12px;
    z-index: 20;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8));
}

/* フッター (星) */
.tec-footer {
    position: absolute;
    bottom: 0; left: 0; width: 100%;
    height: 20px;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    font-size: 11px;
    letter-spacing: -1px;
    z-index: 20;
    border-radius: 0 0 4px 4px;
}

/* 画像なし時の名前表示 */
.tec-name-fallback {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 10px;
    font-weight: bold;
    text-align: center;
    text-shadow: 0 1px 3px #000;
    z-index: 5;
    width: 90%;
    word-break: break-all;
}

/* 敵ステータスバー */
.tower-enemy-stats {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 6px 0 4px;
    font-size: 13px;
}
.tes-item {
    color: #ddd;
}

/* 敵入替えボタン */
.btn-tower-reroll {
    display: block;
    width: 100%;
    padding: 8px 0;
    margin: 4px 0 10px;
    background: rgba(80,80,120,0.6);
    border: 1px solid rgba(150,150,255,0.4);
    border-radius: 6px;
    color: #ccc;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
}
.btn-tower-reroll:active {
    background: rgba(100,100,160,0.8);
    transform: scale(0.97);
}

/* 報酬セクション */
.tower-reward {
    text-align: center;
    padding: 8px 0 0;
    border-top: 1px solid rgba(255,255,255,0.1);
}


</style>
